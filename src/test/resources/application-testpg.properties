# P1-9: profile for Spring-context integration tests against a real PostgreSQL (Testcontainers).
# The datasource URL/username/password are injected at runtime by AbstractPostgresIntegrationTest
# via @DynamicPropertySource. Flyway is ENABLED so the container is built by the full migration set.

spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration

spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

vls.jwt.secret=test-local-jwt-secret-change-me-for-tests-only
vls.jwt.expiration-ms=3600000

# AI disabled for tests
vls.ai.enabled=false
vls.ai.rag.enabled=false
vls.ai.embedding.enabled=false

# Dummy non-empty values so beans that build clients/validate keys can initialize in tests.
vls.s3.access-key=test
vls.s3.secret-key=test
vls.s3.bucket-name=test-bucket
vls.s3.endpoint=http://localhost:9000
vls.whatsapp.encryption-key=testtesttesttesttesttesttesttest

spring.threads.virtual.enabled=true
