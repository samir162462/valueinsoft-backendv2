# Railway production profile.
# Do not put secrets in this file. Set all secret values in Railway Variables.

server.port=${PORT:8080}
server.forward-headers-strategy=framework
spring.threads.virtual.enabled=true
spring.main.banner-mode=${SPRING_MAIN_BANNER_MODE:off}

# Database
# Railway/Neon must use a JDBC URL, not postgresql://.
# Example:
# SPRING_DATASOURCE_URL=jdbc:postgresql://HOST:5432/neondb?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.hikari.pool-name=ValueInSoftHikariPool
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1200000}
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.data-source-properties.ApplicationName=ValueInSoftBackend
vls.database.owner=${VLS_DATABASE_OWNER:${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:}}}

# Flyway is opt-in because this project still has legacy startup compatibility initializers.
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# Security / CORS
vls.jwt.secret=${VLS_JWT_SECRET}
vls.jwt.expiration-ms=${VLS_JWT_EXPIRATION_MS:259200000}
vls.cors.allowed-origins=${VLS_CORS_ALLOWED_ORIGINS:https://valueinsoft.up.railway.app,http://localhost:3000}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}

# Redis cache. Leave disabled unless a Railway Redis service is attached.
vls.cache.redis.enabled=${VLS_REDIS_CACHE_ENABLED:false}
vls.cache.ttl-minutes=${VLS_CACHE_TTL_MINUTES:5}
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=${VLS_REDIS_TIMEOUT:2s}
spring.cache.redis.key-prefix=valueinsoft:
spring.cache.redis.use-key-prefix=true

# Spring AI / Gemini
vls.ai.enabled=${VLS_AI_ENABLED:true}
vls.ai.provider=${VLS_AI_PROVIDER:deepseek}
vls.ai.fallback-provider=${VLS_AI_FALLBACK_PROVIDER:gemini}
vls.ai.fallback-enabled=${VLS_AI_FALLBACK_ENABLED:true}
vls.ai.request-timeout-ms=${VLS_AI_REQUEST_TIMEOUT_MS:60000}
vls.ai.model=${VLS_AI_MODEL:gemini-2.5-flash}
vls.ai.gemini.model=${VLS_AI_GEMINI_MODEL:${VLS_AI_MODEL:gemini-2.5-flash}}
vls.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
vls.ai.deepseek.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
vls.ai.deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}
vls.ai.deepseek.timeout-ms=${DEEPSEEK_TIMEOUT_MS:60000}
vls.ai.temperature=${VLS_AI_TEMPERATURE:0.2}
vls.ai.max-output-tokens=${VLS_AI_MAX_OUTPUT_TOKENS:2000}
vls.ai.thinking-enabled=${VLS_AI_THINKING_ENABLED:true}
vls.ai.timeout-seconds=${VLS_AI_TIMEOUT_SECONDS:30}
vls.ai.monthly-token-limit-default=${VLS_AI_MONTHLY_TOKEN_LIMIT_DEFAULT:1000000}
vls.ai.daily-user-request-limit=${VLS_AI_DAILY_USER_REQUEST_LIMIT:100}
vls.ai.rag.enabled=${VLS_AI_RAG_ENABLED:false}
vls.ai.rag.top-k=${VLS_AI_RAG_TOP_K:5}
vls.ai.rag.similarity-threshold=${VLS_AI_RAG_SIMILARITY_THRESHOLD:0.60}
vls.ai.rag.chunk-target-tokens=${VLS_AI_RAG_CHUNK_TARGET_TOKENS:700}
vls.ai.rag.chunk-overlap-tokens=${VLS_AI_RAG_CHUNK_OVERLAP_TOKENS:120}
vls.ai.rag.keyword-fallback-enabled=${VLS_AI_RAG_KEYWORD_FALLBACK_ENABLED:true}
vls.ai.rag.default-language=${VLS_AI_RAG_DEFAULT_LANGUAGE:en}
vls.ai.embedding.enabled=${VLS_AI_EMBEDDING_ENABLED:true}
vls.ai.embedding.provider=${VLS_AI_EMBEDDING_PROVIDER:google}
vls.ai.embedding.model=${VLS_AI_EMBEDDING_MODEL:gemini-embedding-2}
vls.ai.embedding.dimension=${VLS_AI_EMBEDDING_DIMENSION:768}
vls.ai.embedding.google.api-key=${VLS_AI_EMBEDDING_GOOGLE_API_KEY:${SPRING_AI_GOOGLE_GENAI_API_KEY:${GOOGLE_AI_API_KEY:${GEMINI_API_KEY:}}}}
vls.ai.embedding.google.base-url=${VLS_AI_EMBEDDING_GOOGLE_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
vls.ai.embedding.google.timeout-ms=${VLS_AI_EMBEDDING_GOOGLE_TIMEOUT_MS:60000}
vls.ai.embedding.google.batch-size=${VLS_AI_EMBEDDING_GOOGLE_BATCH_SIZE:100}
vls.ai.tools.enabled=${VLS_AI_TOOLS_ENABLED:true}
vls.ai.write-actions.enabled=${VLS_AI_WRITE_ACTIONS_ENABLED:false}
vls.ai.sql-agent.enabled=${VLS_AI_SQL_AGENT_ENABLED:true}
vls.ai.max-result-rows=${VLS_AI_MAX_RESULT_ROWS:50}
vls.ai.max-schema-tables=${VLS_AI_MAX_SCHEMA_TABLES:8}
vls.ai.max-columns-per-table=${VLS_AI_MAX_COLUMNS_PER_TABLE:20}
vls.ai.cache-ttl-minutes=${VLS_AI_CACHE_TTL_MINUTES:30}
vls.ai.sql-query-timeout-seconds=${VLS_AI_SQL_TIMEOUT_SECONDS:${VLS_AI_SQL_QUERY_TIMEOUT_SECONDS:10}}
vls.ai.sql-max-rows=${VLS_AI_SQL_MAX_ROWS:${VLS_AI_MAX_RESULT_ROWS:50}}
vls.ai.streaming.enabled=${VLS_AI_STREAMING_ENABLED:true}
vls.ai.function-calling.enabled=${VLS_AI_FUNCTION_CALLING_ENABLED:true}
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:google-genai}
spring.ai.google.genai.api-key=${SPRING_AI_GOOGLE_GENAI_API_KEY:${GEMINI_API_KEY:${GOOGLE_AI_API_KEY:}}}
spring.ai.google.genai.chat.options.model=${VLS_AI_GEMINI_MODEL:${VLS_AI_MODEL:gemini-2.5-flash}}
spring.ai.google.genai.chat.options.temperature=${VLS_AI_TEMPERATURE:0.2}
spring.ai.google.genai.chat.options.max-output-tokens=${VLS_AI_MAX_OUTPUT_TOKENS:2000}

# Background scheduling is disabled in the application so Neon can scale down when idle.
Scheduling.enable=${VLS_IDLE_CONNECTION_CLEANUP_ENABLED:false}
fx.deepseek.schedule.enabled=${FX_DEEPSEEK_SCHEDULE_ENABLED:false}
fx.deepseek.initialization.enabled=${FX_DEEPSEEK_INITIALIZATION_ENABLED:false}
platform.admin.metrics.scheduler.enabled=${PLATFORM_ADMIN_METRICS_SCHEDULER_ENABLED:false}
vls.company-insights.scheduled-jobs-enabled=${VLS_COMPANY_INSIGHTS_SCHEDULED_JOBS_ENABLED:false}

# Billing / PayMob
vls.billing.payment-provider=${VLS_BILLING_PAYMENT_PROVIDER:paymob}
vls.billing.mock-checkout-base-url=${VLS_BILLING_MOCK_CHECKOUT_BASE_URL:https://mock-billing.valueinsoft.local/checkout}
vls.billing.renewal-scheduler-enabled=${VLS_BILLING_RENEWAL_SCHEDULER_ENABLED:false}
vls.billing.renewal-scheduler-cron=${VLS_BILLING_RENEWAL_SCHEDULER_CRON:0 10 2 * * *}
vls.billing.renewal-lead-days=${VLS_BILLING_RENEWAL_LEAD_DAYS:5}
vls.billing.dunning-scheduler-enabled=${VLS_BILLING_DUNNING_SCHEDULER_ENABLED:false}
vls.billing.dunning-scheduler-cron=${VLS_BILLING_DUNNING_SCHEDULER_CRON:0 40 2 * * *}
vls.billing.dunning-grace-days=${VLS_BILLING_DUNNING_GRACE_DAYS:3}
vls.billing.dunning-max-attempts=${VLS_BILLING_DUNNING_MAX_ATTEMPTS:3}
vls.billing.manual-retry-cooldown-minutes=${VLS_BILLING_MANUAL_RETRY_COOLDOWN_MINUTES:15}
vls.billing.manual-retry-max-attempts=${VLS_BILLING_MANUAL_RETRY_MAX_ATTEMPTS:5}
vls.billing.checkout-outbox-batch-size=${VLS_BILLING_CHECKOUT_OUTBOX_BATCH_SIZE:10}
vls.billing.checkout-outbox-max-attempts=${VLS_BILLING_CHECKOUT_OUTBOX_MAX_ATTEMPTS:5}
vls.billing.checkout-outbox-retry-delay-seconds=${VLS_BILLING_CHECKOUT_OUTBOX_RETRY_DELAY_SECONDS:60}
vls.paymob.base-url=${VLS_PAYMOB_BASE_URL:https://accept.paymob.com}
vls.paymob.auth-token=${VLS_PAYMOB_AUTH_TOKEN:}
vls.paymob.hmac-secret=${VLS_PAYMOB_HMAC_SECRET:}
vls.paymob.card-integration-id=${VLS_PAYMOB_CARD_INTEGRATION_ID:0}
vls.paymob.wallet-integration-id=${VLS_PAYMOB_WALLET_INTEGRATION_ID:0}
vls.paymob.card-iframe-id=${VLS_PAYMOB_CARD_IFRAME_ID:0}
vls.paymob.wallet-iframe-id=${VLS_PAYMOB_WALLET_IFRAME_ID:0}
vls.fawrypay.base-url=${VLS_FAWRYPAY_BASE_URL:https://atfawry.fawrystaging.com}
vls.fawrypay.charge-path=${VLS_FAWRYPAY_CHARGE_PATH:/ECommerceWeb/Fawry/payments/charge}
vls.fawrypay.merchant-code=${VLS_FAWRYPAY_MERCHANT_CODE:}
vls.fawrypay.secure-hash-key=${VLS_FAWRYPAY_SECURE_HASH_KEY:}
vls.fawrypay.return-url=${VLS_FAWRYPAY_RETURN_URL:}
vls.fawrypay.webhook-url=${VLS_FAWRYPAY_WEBHOOK_URL:}
vls.fawrypay.language=${VLS_FAWRYPAY_LANGUAGE:en-gb}
vls.fawrypay.payment-method=${VLS_FAWRYPAY_PAYMENT_METHOD:}
vls.fawrypay.auth-capture-mode-payment=${VLS_FAWRYPAY_AUTH_CAPTURE_MODE_PAYMENT:false}
vls.fawrypay.payment-expiry-minutes=${VLS_FAWRYPAY_PAYMENT_EXPIRY_MINUTES:1440}
vls.fawrypay.default-customer-mobile=${VLS_FAWRYPAY_DEFAULT_CUSTOMER_MOBILE:01000000000}

# S3-compatible object storage
vls.s3.endpoint=${S3_ENDPOINT}
vls.s3.region=${S3_REGION:auto}
vls.s3.access-key=${S3_ACCESS_KEY}
vls.s3.secret-key=${S3_SECRET_KEY}
vls.s3.bucket-name=${S3_BUCKET_NAME}

# POS Offline Sync
valueinsoft.pos.offline.allow-offline-sync=${VLS_POS_OFFLINE_ALLOW:true}
valueinsoft.pos.offline.max-orders-per-batch=${VLS_POS_OFFLINE_MAX_ORDERS_PER_BATCH:50}
valueinsoft.pos.offline.max-items-per-order=${VLS_POS_OFFLINE_MAX_ITEMS_PER_ORDER:100}
valueinsoft.pos.offline.max-bootstrap-page-size=${VLS_POS_OFFLINE_MAX_BOOTSTRAP_PAGE:500}
valueinsoft.pos.offline.max-offline-hours-default=${VLS_POS_OFFLINE_MAX_HOURS:24}
valueinsoft.pos.offline.run-tenant-migration-on-startup=${VLS_POS_OFFLINE_RUN_TENANT_MIGRATION_ON_STARTUP:false}
valueinsoft.pos.offline.admin.posting-enabled=${VLS_POS_OFFLINE_ADMIN_POSTING_ENABLED:true}
valueinsoft.pos.offline.admin.max-post-batch-size=${VLS_POS_OFFLINE_ADMIN_MAX_POST_BATCH_SIZE:50}
valueinsoft.pos.offline.worker.enabled=${VLS_POS_OFFLINE_WORKER_ENABLED:false}
valueinsoft.pos.offline.worker.processing-enabled=${VLS_POS_OFFLINE_WORKER_PROCESSING_ENABLED:false}
valueinsoft.pos.offline.worker.validation-enabled=${VLS_POS_OFFLINE_WORKER_VALIDATION_ENABLED:false}
valueinsoft.pos.offline.worker.posting-enabled=${VLS_POS_OFFLINE_WORKER_POSTING_ENABLED:false}
valueinsoft.pos.offline.worker.batch-size=${VLS_POS_OFFLINE_WORKER_BATCH_SIZE:25}
valueinsoft.pos.offline.worker.fixed-delay-ms=${VLS_POS_OFFLINE_WORKER_FIXED_DELAY_MS:30000}
valueinsoft.pos.offline.worker.stuck-threshold-minutes=${VLS_POS_OFFLINE_WORKER_STUCK_THRESHOLD_MINUTES:15}
valueinsoft.pos.offline.worker.targets=${VLS_POS_OFFLINE_WORKER_TARGETS:}

# Inventory Product Import
inventory.import.max-file-size-bytes=${VLS_INVENTORY_IMPORT_MAX_FILE_SIZE_BYTES:5242880}
inventory.import.max-rows=${VLS_INVENTORY_IMPORT_MAX_ROWS:10000}
inventory.import.preview-page-max-size=${VLS_INVENTORY_IMPORT_PREVIEW_PAGE_MAX_SIZE:100}
inventory.import.cleanup.enabled=${VLS_INVENTORY_IMPORT_CLEANUP_ENABLED:false}
inventory.import.cleanup.retention-days=${VLS_INVENTORY_IMPORT_CLEANUP_RETENTION_DAYS:90}
inventory.import.cleanup.max-batches-per-tenant=${VLS_INVENTORY_IMPORT_CLEANUP_MAX_BATCHES_PER_TENANT:500}
inventory.import.cleanup.cron=${VLS_INVENTORY_IMPORT_CLEANUP_CRON:0 25 3 * * *}

# Phase 0 legacy inventory writer retirement controls. Keep enabled until metrics
# and reconciliation are clean; use exact companyId:branchId scopes for canaries.
vls.inventory.legacy-writers.generic-transaction.enabled=${VLS_INVENTORY_LEGACY_GENERIC_TRANSACTION_ENABLED:true}
vls.inventory.legacy-writers.generic-transaction.disabled-scopes=${VLS_INVENTORY_LEGACY_GENERIC_TRANSACTION_DISABLED_SCOPES:}
vls.inventory.legacy-writers.standalone-serialized-stock-in.enabled=${VLS_INVENTORY_LEGACY_SERIALIZED_STOCK_IN_ENABLED:true}
vls.inventory.legacy-writers.standalone-serialized-stock-in.disabled-scopes=${VLS_INVENTORY_LEGACY_SERIALIZED_STOCK_IN_DISABLED_SCOPES:}
vls.inventory.legacy-writers.damage-hard-delete.enabled=${VLS_INVENTORY_LEGACY_DAMAGE_HARD_DELETE_ENABLED:false}
vls.inventory.legacy-writers.damage-hard-delete.disabled-scopes=${VLS_INVENTORY_LEGACY_DAMAGE_HARD_DELETE_DISABLED_SCOPES:}

# Production logging
logging.level.root=${LOGGING_LEVEL_ROOT:ERROR}
logging.level.com.example.valueinsoftbackend=${VLS_APP_LOG_LEVEL:ERROR}
logging.level.com.example.valueinsoftbackend.ai=${VLS_AI_LOG_LEVEL:ERROR}
logging.level.org.springframework.web=${VLS_SPRING_WEB_LOG_LEVEL:ERROR}
logging.level.org.springframework.jdbc=${VLS_SPRING_JDBC_LOG_LEVEL:ERROR}
logging.level.org.springframework.ai=${VLS_SPRING_AI_LOG_LEVEL:ERROR}
logging.level.software.amazon.awssdk=${VLS_AWS_SDK_LOG_LEVEL:ERROR}

# Open-items Phase 8 metrics. Restrict /actuator/prometheus at the ingress/firewall.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.health.db.enabled=false
management.metrics.tags.application=valueinsoft-backend
finance.openitems.monitoring.enabled=${VLS_OPENITEMS_MONITORING_ENABLED:false}
finance.openitems.monitoring.initial-delay-ms=${VLS_OPENITEMS_MONITORING_INITIAL_DELAY_MS:60000}
finance.openitems.monitoring.fixed-delay-ms=${VLS_OPENITEMS_MONITORING_FIXED_DELAY_MS:300000}
