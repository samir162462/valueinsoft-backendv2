spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${PORT:8080}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}
terminate.delay=PT6H

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=ValueInSoftHikariPool

vls.database.owner=${VLS_DATABASE_OWNER:${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}}
