spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
terminate.delay=PT6H

spring.datasource.driver-class-name=org.postgresql.Driver

vls.database.owner=${VLS_DATABASE_OWNER:${SPRING_DATASOURCE_USERNAME:postgres}}
vls.jwt.secret=${VLS_JWT_SECRET:}
vls.jwt.expiration-ms=${VLS_JWT_EXPIRATION_MS:259200000}
vls.paymob.auth-token=${VLS_PAYMOB_AUTH_TOKEN:}
vls.paymob.card-integration-id=${VLS_PAYMOB_CARD_INTEGRATION_ID:1989683}
vls.paymob.wallet-integration-id=${VLS_PAYMOB_WALLET_INTEGRATION_ID:0}
vls.paymob.card-iframe-id=${VLS_PAYMOB_CARD_IFRAME_ID:370887}
vls.paymob.wallet-iframe-id=${VLS_PAYMOB_WALLET_IFRAME_ID:0}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
