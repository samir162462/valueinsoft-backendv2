

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/localvls}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0000}
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.config.import=optional:file:./config/application-dev.local.properties

vls.jwt.secret=${VLS_JWT_SECRET:dev-local-jwt-secret-change-me}
vls.cors.allowed-origins=${VLS_CORS_ALLOWED_ORIGINS:http://localhost:3000}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:google-genai}

spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

vls.ai.enabled=${VLS_AI_ENABLED:true}
vls.ai.provider=${VLS_AI_PROVIDER:google}
vls.ai.model=${VLS_AI_MODEL:gemini-2.5-flash}

spring.ai.google.genai.api-key=${SPRING_AI_GOOGLE_GENAI_API_KEY:${GOOGLE_API_KEY:}}
spring.ai.google.genai.chat.options.model=${VLS_AI_MODEL:gemini-2.5-flash}
